name: Compile RetroArch Web Player

on:
  workflow_dispatch: # 支持在 GitHub 页面上手动点击按钮触发编译

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 安装宿主机依赖
      - name: Install Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git webp

      # 2. 安装并配置 Emscripten SDK (WASM 编译器)
      - name: Setup Emscripten SDK
        run: |
          git clone --depth=1 https://github.com/emscripten-core/emsdk.git
          cd emsdk
          ./emsdk install latest
          ./emsdk activate latest
          # 将 emsdk 路径写入环境变量，后续步骤均可直接使用 emcc/emmake
          echo "$GITHUB_WORKSPACE/emsdk" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/emsdk/upstream/emscripten" >> $GITHUB_PATH

      # 3. 拉取 RetroArch 官方最新源码
      - name: Clone RetroArch Frontend
        run: |
          git clone --depth=1 https://github.com/libretro/RetroArch.git retroarch-src

      # 4. 拉取四大最强 2D 模拟器内核最新源码
      - name: Clone Cores Source
        run: |
          mkdir -p cores-src
          git clone --depth=1 https://github.com/libretro/libretro-fceumm.git cores-src/fceumm
          git clone --depth=1 https://github.com/libretro/snes9x.git cores-src/snes9x
          git clone --depth=1 https://github.com/libretro/Genesis-Plus-GX.git cores-src/genesis
          git clone --depth=1 https://github.com/libretro/mgba.git cores-src/mgba

      # 5. 拉取官方最新全套菜单资源 (Assets)
      - name: Clone RetroArch Assets
        run: |
          git clone --depth=1 https://github.com/libretro/retroarch-assets.git assets-src

      # 6. 编译 RetroArch 网页主程序
      - name: Build Web Frontend
        run: |
          source emsdk/emsdk_env.sh
          cd $GITHUB_WORKSPACE/retroarch-src
          emmake make -f Makefile.emscripten HAVE_STATIC_DUMMY=1 -j$(nproc)

      # 7. 编译四大内核
      - name: Build Cores to WASM
        run: |
          source emsdk/emsdk_env.sh
          
          echo "=== 编译 FC (FCEUmm) ==="
          cd $GITHUB_WORKSPACE/cores-src/fceumm
          emmake make -f Makefile.libretro platform=emscripten -j$(nproc)
          
          echo "=== 编译 SFC (Snes9x) ==="
          cd $GITHUB_WORKSPACE/cores-src/snes9x/libretro
          emmake make platform=emscripten -j$(nproc)
          
          echo "=== 编译 MD (Genesis Plus GX) ==="
          cd $GITHUB_WORKSPACE/cores-src/genesis
          emmake make -f Makefile.libretro platform=emscripten -j$(nproc)
          
          echo "=== 编译 GBA (mGBA) ==="
          cd $GITHUB_WORKSPACE/cores-src/mgba
          emmake make -f Makefile.libretro platform=emscripten -j$(nproc)

      - name: Prepare Artifact Directory
        run: |
          mkdir -p dist/cores
          mkdir -p dist/assets
          
          # 1. 核心修正：直接去你搜出来的 libretro 壳目录，把配套的 index.html、css 和外壳 js 一个不漏全带走
          cp retroarch-src/pkg/emscripten/libretro/index.html dist/
          cp retroarch-src/pkg/emscripten/libretro/libretro.css dist/
          cp retroarch-src/pkg/emscripten/libretro/libretro.js dist/
          cp retroarch-src/pkg/emscripten/libretro/core_list.js dist/
          cp retroarch-src/pkg/emscripten/libretro/browserfs.min.js dist/
          
          # 2. 复制你根目录下热乎编译出来的核心本体
          cp retroarch-src/retroarch.js dist/
          # 动态匹配你可能编译出的配套 .wasm 文件（有些配置下可能包含 worker.js，通配符最稳）
          cp retroarch-src/retroarch.wasm dist/ 2>/dev/null || true
          cp retroarch-src/*.wasm dist/ 2>/dev/null || true
          
          # 3. 聚集四个内核
          find cores-src/ -name "*_libretro_emscripten.*" -exec cp {} dist/cores/ \;
          
          # 4. 拷贝最新的 Assets 资源文件夹（如果你的工作流有涉及）
          # if [ -d "assets-src" ]; then cp -r assets-src/* dist/assets/ 2>/dev/null || true; fi

      - name: Compress Artifacts to tar.gz
        run: |
          # -C dist . 表示切换到 dist 目录下再打包，这样解压时就不会包含多余的 dist 外层文件夹
          tar -czvf retroarch-web-player.tar.gz -C dist .

      - name: Upload Streamlined Tarball
        uses: actions/upload-artifact@v4
        with:
          name: RetroArch-Web-Player-tarball
          path: retroarch-web-player.tar.gz
          if-no-files-found: error
